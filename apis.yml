apis:
  - aid: astrology-api:astrology-api
    name: Astrology API
    description: >-
      The Astrology API provides comprehensive astrological data including
      Indian (Vedic) astrology with panchang and dosha data, Western astrology
      with planetary transits and synastry, daily and monthly horoscope
      predictions, tarot readings, and PDF report generation in both Western
      and Indian formats.
    humanURL: https://astrologyapi.com/docs
