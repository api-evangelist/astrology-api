aid: astrology-api
name: Astrology API
description: >-
  Astrology API (astrologyapi.com) is a powerful tool that provides developers
  with access to accurate and reliable astrological data. The API offers Indian
  (Vedic) astrology, Western astrology, horoscope predictions, tarot readings,
  and PDF report generation. It provides planetary positions, zodiac sign
  information, birth chart calculations, compatibility analysis, panchang data,
  moon phases, and daily/monthly horoscope predictions. The API is JSON-based
  with SDK support and Postman collections available for testing.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Astrology
  - Horoscopes
  - Zodiac
  - Vedic Astrology
  - Western Astrology
url: >-
