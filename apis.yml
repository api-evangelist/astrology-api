common:
  - type: Portal
    url: https://astrologyapi.com/
    title: Astrology API Website
  - type: Documentation
    url: https://astrologyapi.com/docs
    title: Documentation
  - type: SignUp
    url: https://astrologyapi.com/signup
    title: Sign Up
  - type: Pricing
    url: https://astrologyapi.com/pricing
    title: Pricing
  - type: Features
    data:
      - name: Indian (Vedic) Astrology
        description: >-
          Vedic astrology data including birth chart basics, horoscope dosha
          analysis, yearly predictions (Varshaphal), daily nakshatra forecasts,
          and panchang (Hindu almanac) data.
      - name: Western Astrology
        description: >-
          Western astrology data including birth chart basics, numerology,
          synastry (relationship analysis), moon phases, planetary transits,
          and zodiac compatibility.
      - name: Horoscope Predictions
        description: >-
          Daily, weekly, and monthly horoscope predictions for all sun signs
          in both Western and Vedic astrology traditions.
      - name: Tarot API
        description: >-
          General tarot card readings and yes/no tarot predictions for
          integrating tarot functionality into applications.
      - name: PDF Report Generation
        description: >-
          Generate detailed PDF horoscope reports in five types covering
          both Western and Indian astrology formats for end-user delivery.
  - type: UseCases
    data:
      - name: Astrology App Development
        description: >-
          Developers build mobile and web astrology applications integrating
          daily horoscopes, birth charts, and compatibility analysis.
      - name: Horoscope Website Integration
        description: >-
          Content websites add personalized horoscope sections using the
          Astrology API's daily and monthly prediction endpoints.
      - name: Vedic Consultation Platforms
        description: >-
          Astrology consultation platforms use the Vedic API for birth chart
          calculations and panchang data to support professional astrologers.
  - type: Integrations
    data:
      - name: Postman Collection
        description: >-
          Official Postman collection available for testing Astrology API
          endpoints before integration.
      - name: SDK Downloads
        description: >-
          Language-specific SDK downloads available for easier integration
          with the Astrology API.
